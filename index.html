// ── Slime drip particles ─────────────────────────────────────────────
const sc = document.getElementById('slime');
const sx = sc.getContext('2d');
sc.width = window.innerWidth; sc.height = window.innerHeight;

class Drip {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x = Math.random() * sc.width;
    this.y = initial ? Math.random() * sc.height : -20 - Math.random() * 200;
    this.w = 4 + Math.random() * 10;
    this.speed = 0.4 + Math.random() * 1.2;
    this.len = 40 + Math.random() * 120;
    this.alpha = 0.15 + Math.random() * 0.35;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.01 + Math.random() * 0.02;
  }
  update() {
    this.y += this.speed; this.wobble += this.wobbleSpeed;
    if (this.y - this.len > sc.height) this.reset(false);
  }
  draw() {
    const x = this.x + Math.sin(this.wobble) * 1.5;
    sx.save(); sx.globalAlpha = this.alpha;
    const grad = sx.createLinearGradient(x, this.y-this.len, x, this.y);
    grad.addColorStop(0,'rgba(34,197,94,0)'); grad.addColorStop(0.3,'rgba(34,197,94,0.8)'); grad.addColorStop(1,'rgba(74,222,128,1)');
    sx.strokeStyle = grad; sx.lineWidth = this.w*0.5; sx.lineCap='round';
    sx.beginPath(); sx.moveTo(x,this.y-this.len); sx.lineTo(x,this.y); sx.stroke();
    sx.fillStyle='#4ade80'; sx.beginPath(); sx.ellipse(x,this.y+this.w*0.4,this.w*0.5,this.w*0.7,0,0,Math.PI*2); sx.fill();
    sx.globalAlpha=this.alpha*0.3; sx.fillStyle='#86efac'; sx.beginPath(); sx.ellipse(x,this.y+this.w*0.4,this.w,this.w*1.3,0,0,Math.PI*2); sx.fill();
    sx.restore();
  }
}
const drips = Array.from({length:35},()=>new Drip());
function drawBackground() {
  sx.clearRect(0,0,sc.width,sc.height);
  const bg=sx.createRadialGradient(sc.width/2,sc.height/2,0,sc.width/2,sc.height/2,sc.width*0.8);
  bg.addColorStop(0,'rgba(0,30,8,0)'); bg.addColorStop(1,'rgba(0,8,2,0.6)');
  sx.fillStyle=bg; sx.fillRect(0,0,sc.width,sc.height);
  const pool=sx.createRadialGradient(sc.width/2,sc.height,0,sc.width/2,sc.height,sc.width*0.5);
  pool.addColorStop(0,'rgba(34,197,94,0.18)'); pool.addColorStop(0.5,'rgba(34,197,94,0.06)'); pool.addColorStop(1,'rgba(0,0,0,0)');
  sx.fillStyle=pool; sx.fillRect(0,0,sc.width,sc.height);
}
function animateSlime() { drawBackground(); drips.forEach(d=>{d.update();d.draw();}); requestAnimationFrame(animateSlime); }
animateSlime();

// ── Three.js ─────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setSize(W,H); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0); renderer.shadowMap.enabled=true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,W/H,0.1,100);
camera.position.set(0,0,5);

scene.add(new THREE.AmbientLight(0x002208,1.2));
const key=new THREE.DirectionalLight(0xffffff,1.4); key.position.set(5,5,5); key.castShadow=true; scene.add(key);
const greenFill=new THREE.DirectionalLight(0x22c55e,0.8); greenFill.position.set(-4,-2,3); scene.add(greenFill);
const rim=new THREE.DirectionalLight(0x86efac,0.6); rim.position.set(0,2,-5); scene.add(rim);
const point=new THREE.PointLight(0x4ade80,1.2,20); point.position.set(2,2,3); scene.add(point);

// ── Texture fine-tuning ───────────────────────────────────────────────
const FRONT = { repeat: 0.69, offsetX: 0.153, offsetY: 0.170 };
const BACK  = { repeat: 0.695, offsetX: 0.0, offsetY: 0.012 };

// ── Load image into canvas texture, NO UV remapping ──────────────────
// The coin face image is square and should fill the cylinder cap exactly.
// We simply draw the image centered & covering a 1024x1024 canvas.
// No circle clip, no UV scale — let the geometry UVs map it naturally.
function makeFaceTex(b64, callback) {
  const img = new Image();
  img.onload = () => {
    const size = 1024;
    const offscreen = document.createElement('canvas');
    offscreen.width = size; offscreen.height = size;
    const ctx = offscreen.getContext('2d');
    // Cover-fit: crop to square from center
    const aspect = img.width / img.height;
    let sx=0, sy=0, sw=img.width, sh=img.height;
    if (aspect > 1) { sw=img.height; sx=(img.width-sw)/2; }
    else            { sh=img.width;  sy=(img.height-sh)/2; }
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
    const tex = new THREE.CanvasTexture(offscreen);
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    callback(tex);
  };
  img.src = "data:image/jpeg;base64," + b64;
}

// Reeded edge
const reedsCanvas = document.createElement('canvas');
reedsCanvas.width=1024; reedsCanvas.height=64;
const rc=reedsCanvas.getContext('2d');
for(let i=0;i<360;i++){
  const x=(i/360)*1024, w=1024/360;
  const g=rc.createLinearGradient(x,0,x+w,0);
  if(i%2===0){g.addColorStop(0,'#bbb');g.addColorStop(0.5,'#ffffff');g.addColorStop(1,'#aaa');}
  else{g.addColorStop(0,'#111');g.addColorStop(0.5,'#222');g.addColorStop(1,'#0a0a0a');}
  rc.fillStyle=g; rc.fillRect(x,0,w,64);
}
const reedTex=new THREE.CanvasTexture(reedsCanvas); reedTex.wrapS=THREE.RepeatWrapping;

const edgeMat  = new THREE.MeshStandardMaterial({map:reedTex, metalness:0.92, roughness:0.18, color:0xcccccc});
const frontMat = new THREE.MeshStandardMaterial({metalness:0.2, roughness:0.4});
const backMat  = new THREE.MeshStandardMaterial({metalness:0.2, roughness:0.4});

const geo = new THREE.CylinderGeometry(1.0, 1.0, 0.15, 180, 1, false);

// Fix cap UVs: Three.js CylinderGeometry maps cap UVs so that the
// disk radius maps to 0..0.5 from center, meaning the image only
// fills HALF the texture area (the rest is wasted corners).
// We need to remap so the full image square maps onto the disk.
// Correct approach: DON'T scale — instead set texture.repeat = 2, offset = -0.5
// so the center of the image aligns with UV 0.5,0.5 and fills the disk.
// Actually the simplest fix: use texture.repeat and offset on the material.

let loadedCount = 0;
function onTexReady() {
  loadedCount++;
  if (loadedCount < 2) return;

  // Use repeat+offset to zoom texture to fill the cap UV space
  // Three CylinderGeometry cap: center=0.5,0.5, edge UVs reach ~0 and ~1
  // So the image IS already mapped 1:1 — no scaling needed on the texture.
  // The perceived small size is likely due to the coin being viewed at an angle.
  // Let's just confirm by NOT touching UVs or repeat.

  // Wrap coin in a pivot group so we can set the correct initial orientation:
  // - rotation.x = PI/2 to lay flat (face toward camera)
  // - rotation.z = -PI/4 to undo the 45° CW tilt (CCW = negative Z)
  // - then add -PI/4 more for the quarter-turn CCW the user requested = -PI/2 total
  const pivot = new THREE.Group();
  scene.add(pivot);

  const coin = new THREE.Mesh(geo, [edgeMat, frontMat, backMat]);
  // Initial orientation: face camera, then rotate -PI/2 on Z (quarter turn CCW)
  coin.rotation.order = 'XZY';
  coin.rotation.x = Math.PI / 2;
  coin.rotation.z = -Math.PI / 2; // 45° fix + additional quarter turn CCW
  coin.castShadow = true;
  pivot.add(coin);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(12,12),
    new THREE.MeshStandardMaterial({color:0x001a06, roughness:0.1, transparent:true, opacity:0.6})
  );
  floor.rotation.x=-Math.PI/2; floor.position.y=-2.2; floor.receiveShadow=true; scene.add(floor);

  const reflCoin = new THREE.Mesh(geo, [
    edgeMat,
    new THREE.MeshStandardMaterial({map:frontMat.map, metalness:0.2, roughness:0.4, transparent:true, opacity:0.2}),
    new THREE.MeshStandardMaterial({map:backMat.map,  metalness:0.2, roughness:0.4, transparent:true, opacity:0.2}),
  ]);
  reflCoin.scale.y=-1;
  scene.add(reflCoin);

  let isDragging=false, prevMouse={x:0,y:0}, velX=0, velY=0;
  let rotX=Math.PI/2, rotZ=0;

  canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};velX=velY=0;});
  canvas.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    velX=(e.clientY-prevMouse.y)*0.004; velY=(e.clientX-prevMouse.x)*0.004;
    rotX+=velX; rotZ+=velY; prevMouse={x:e.clientX,y:e.clientY};
  });
  window.addEventListener('mouseup',()=>isDragging=false);
  canvas.addEventListener('touchstart',e=>{isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};velX=velY=0;});
  canvas.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    velX=(e.touches[0].clientY-prevMouse.y)*0.004; velY=(e.touches[0].clientX-prevMouse.x)*0.004;
    rotX+=velX; rotZ+=velY; prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
    e.preventDefault();
  },{passive:false});
  window.addEventListener('touchend',()=>isDragging=false);

  let zoom=5;
  window.addEventListener('wheel',e=>{zoom=Math.max(2.5,Math.min(10,zoom+e.deltaY*0.005));});

  let t=0;
  function animate() {
    requestAnimationFrame(animate);
    t+=0.008;
    if(!isDragging){
      velY = velY*0.98 + 0.000067;
      velX *= 0.98;
      rotZ+=velY; rotX+=velX;
      rotX+=(Math.PI/2-rotX)*0.006;
    }
    const bob=Math.sin(t*0.8)*0.08;
    pivot.position.y=bob;
    pivot.rotation.x=rotX;
    pivot.rotation.z=rotZ;

    reflCoin.position.y=-2.2*2-pivot.position.y;
    reflCoin.rotation.x=-rotX+Math.PI; reflCoin.rotation.z=rotZ;
    point.position.x=Math.cos(t*0.5)*4; point.position.y=Math.sin(t*0.35)*2.5;
    point.position.z=3+Math.sin(t*0.25)*1.5; point.intensity=0.9+Math.sin(t*1.2)*0.3;
    camera.position.z=zoom;
    renderer.render(scene,camera);
  }
  animate();
}
